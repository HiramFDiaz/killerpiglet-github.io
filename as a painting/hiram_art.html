<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Museo del Prado — Sala Temporal: El Campeón y El Gato</title>
<style>
  :root {
    --wall:         #4a1f1f;
    --wall-deep:    #321416;
    --wall-light:   #5e2a28;
    --parchment:    #f0e3c2;
    --parchment-2:  #e6d7b0;
    --ink:          #2a1810;
    --gold:         #c9a24a;
    --gold-deep:    #8a6a20;
    --frame-1:      #6a4820;
    --frame-2:      #3a2410;
    --frame-highlight: #e8c878;
    --muted:        #8a7a5a;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--wall);
    color: var(--parchment);
    font-family: "Garamond", "Cormorant Garamond", "Times New Roman", serif;
    line-height: 1.45;
    overflow-x: hidden;
  }

  body {
    background:
      radial-gradient(ellipse at top, var(--wall-light) 0%, var(--wall) 50%, var(--wall-deep) 100%),
      repeating-linear-gradient(0deg, rgba(0,0,0,0.05) 0 1px, transparent 1px 3px);
    min-height: 100vh;
  }

  /* ---------- MUSEUM HEADER ---------- */
  header {
    text-align: center;
    padding: 34px 20px 12px;
    border-bottom: 1px solid rgba(201,162,74,0.25);
  }
  header .crest {
    width: 52px;
    height: 52px;
    margin: 0 auto 12px;
    display: block;
  }
  header .museo {
    font-family: "Trajan Pro", "Cinzel", "Times New Roman", serif;
    font-size: clamp(20px, 3.6vw, 32px);
    letter-spacing: 0.38em;
    font-weight: 600;
    color: var(--gold);
    margin: 0;
    text-transform: uppercase;
  }
  header .del-prado {
    font-family: "Trajan Pro", "Cinzel", "Times New Roman", serif;
    font-size: clamp(14px, 2.2vw, 19px);
    letter-spacing: 0.32em;
    color: var(--parchment);
    margin-top: 4px;
    text-transform: uppercase;
  }
  header .sala {
    margin-top: 16px;
    font-style: italic;
    color: var(--parchment-2);
    font-size: 0.95rem;
    letter-spacing: 0.08em;
  }
  header .sala .tag {
    display: inline-block;
    border: 1px solid var(--gold);
    padding: 3px 12px;
    margin-right: 10px;
    letter-spacing: 0.16em;
    font-size: 0.72rem;
    text-transform: uppercase;
    color: var(--gold);
    font-style: normal;
  }

  /* ---------- GALLERY ---------- */
  .gallery {
    max-width: 1100px;
    margin: 30px auto 20px;
    padding: 0 16px;
    position: relative;
  }

  .stage {
    position: relative;
    background: var(--wall-deep);
    border: 1px solid rgba(0,0,0,0.5);
    border-radius: 2px;
    padding: 36px 30px 20px;
    box-shadow: inset 0 0 120px rgba(0,0,0,0.6);
  }

  /* Track lighting effect */
  .stage::before {
    content: "";
    position: absolute;
    top: -30px;
    left: 50%;
    transform: translateX(-50%);
    width: 320px;
    height: 60px;
    background: radial-gradient(ellipse at center, rgba(232,200,120,0.35) 0%, transparent 70%);
    pointer-events: none;
  }

  /* PAINTING FRAME (ornate gilded frame) */
  .frame {
    position: relative;
    margin: 0 auto;
    max-width: 720px;
    background: linear-gradient(135deg, var(--frame-1) 0%, var(--frame-highlight) 30%, var(--frame-1) 55%, var(--frame-2) 100%);
    padding: 18px;
    border-radius: 3px;
    box-shadow:
      0 20px 60px rgba(0,0,0,0.75),
      0 2px 4px rgba(0,0,0,0.4),
      inset 0 0 0 1px rgba(255,240,200,0.15);
  }
  .frame::before {
    content: "";
    position: absolute;
    inset: 6px;
    border: 2px solid var(--frame-2);
    border-radius: 2px;
    pointer-events: none;
  }
  .frame::after {
    content: "";
    position: absolute;
    inset: 12px;
    border: 1px solid rgba(232,200,120,0.55);
    border-radius: 1px;
    pointer-events: none;
  }

  .canvas-wrap {
    position: relative;
    background: #1a0f08;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
    overflow: hidden;
  }
  .canvas-wrap img {
    display: block;
    width: 100%;
    height: auto;
    opacity: 0;
    transition: opacity 0.55s ease;
  }
  .canvas-wrap img.active { opacity: 1; }
  .canvas-wrap img:not(:first-child) { position: absolute; inset: 0; }

  /* Gallery light bloom on canvas */
  .canvas-wrap::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(232,200,120,0.12) 0%, transparent 55%);
    pointer-events: none;
  }

  /* NAV ARROWS */
  .nav-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(14,8,6,0.5);
    border: 1px solid var(--gold);
    color: var(--gold);
    width: 44px;
    height: 44px;
    border-radius: 50%;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, color 0.2s;
    font-family: serif;
    z-index: 5;
  }
  .nav-arrow:hover { background: var(--gold); color: var(--wall-deep); }
  .nav-arrow.prev { left: 16px; }
  .nav-arrow.next { right: 16px; }

  /* ---------- MUSEUM PLACARD ---------- */
  .placard {
    max-width: 720px;
    margin: 24px auto 0;
    background: var(--parchment);
    color: var(--ink);
    padding: 22px 26px 20px;
    border-radius: 2px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.5);
    background-image:
      radial-gradient(ellipse at 80% 20%, rgba(0,0,0,0.05) 0%, transparent 40%),
      linear-gradient(180deg, var(--parchment) 0%, var(--parchment-2) 100%);
    position: relative;
  }
  .placard::before {
    content: "";
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(138,106,32,0.35);
    pointer-events: none;
  }

  .placard .inv {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--gold-deep);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .placard h2 {
    font-family: "Garamond", "Cormorant Garamond", "Times New Roman", serif;
    font-size: clamp(1.3rem, 2.6vw, 1.75rem);
    font-weight: 600;
    margin: 0 0 4px;
    color: var(--ink);
    font-style: italic;
  }
  .placard .artist {
    font-size: 0.95rem;
    color: var(--ink);
    margin-bottom: 2px;
  }
  .placard .meta {
    font-size: 0.85rem;
    color: var(--muted);
    font-style: italic;
    margin-bottom: 14px;
  }
  .placard .commentary {
    font-size: 0.95rem;
    color: var(--ink);
    line-height: 1.55;
    margin: 10px 0 0;
  }
  .placard .commentary::first-letter {
    font-size: 2.4em;
    float: left;
    line-height: 0.9;
    margin-right: 6px;
    color: var(--gold-deep);
    font-weight: 700;
    font-family: "Cinzel", "Trajan Pro", serif;
  }

  /* ---------- THUMBNAIL STRIP ---------- */
  .thumbstrip {
    max-width: 900px;
    margin: 30px auto 10px;
    display: flex;
    justify-content: center;
    gap: 14px;
    padding: 0 16px;
    flex-wrap: wrap;
  }
  .thumb {
    width: 120px;
    height: 120px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    border: 3px solid transparent;
    background: var(--frame-1);
    padding: 4px;
    transition: transform 0.2s;
  }
  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: saturate(0.9) brightness(0.85);
    transition: filter 0.25s;
  }
  .thumb.active {
    border-color: var(--gold);
    box-shadow: 0 0 18px rgba(201,162,74,0.5);
  }
  .thumb.active img { filter: saturate(1.15) brightness(1); }
  .thumb:hover { transform: translateY(-3px); }
  .thumb:hover img { filter: saturate(1) brightness(0.95); }

  /* ---------- CONTROLS ---------- */
  .controls {
    max-width: 720px;
    margin: 14px auto 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--parchment-2);
    font-size: 0.85rem;
    padding: 0 16px;
    font-style: italic;
    letter-spacing: 0.04em;
  }
  .controls .counter { color: var(--gold); font-family: "Trajan Pro", serif; letter-spacing: 0.2em; }
  .controls .auto-btn {
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 5px 14px;
    border-radius: 2px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.78rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .controls .auto-btn.on { background: var(--gold); color: var(--wall-deep); }

  /* ---------- FOOTER ---------- */
  footer {
    text-align: center;
    margin-top: 50px;
    padding: 20px 16px 40px;
    border-top: 1px solid rgba(201,162,74,0.18);
    color: var(--parchment-2);
    font-size: 0.82rem;
    font-style: italic;
  }
  footer .mark { color: var(--gold); letter-spacing: 0.25em; text-transform: uppercase; }

  @media (max-width: 620px) {
    .stage { padding: 24px 12px 16px; }
    .frame { padding: 10px; }
    .nav-arrow { width: 36px; height: 36px; font-size: 18px; }
    .thumb { width: 82px; height: 82px; }
  }
</style>
</head>
<body>

<header>
  <!-- Prado-style crest -->
  <svg class="crest" viewBox="0 0 64 64" aria-hidden="true">
    <circle cx="32" cy="32" r="30" fill="none" stroke="#c9a24a" stroke-width="1.5"/>
    <path d="M32 10 L38 26 L55 28 L42 40 L46 56 L32 48 L18 56 L22 40 L9 28 L26 26 Z"
          fill="#c9a24a" stroke="#8a6a20" stroke-width="0.6"/>
    <circle cx="32" cy="32" r="4" fill="#4a1f1f"/>
  </svg>
  <h1 class="museo">Museo</h1>
  <div class="del-prado">del Prado</div>
  <div class="sala">
    <span class="tag">Sala Temporal</span>
    El Campeón y El Gato &middot; Una Serie en Cuatro Escuelas
  </div>
</header>

<div class="gallery">

  <div class="stage">
    <button class="nav-arrow prev" aria-label="Anterior" onclick="prev()">‹</button>
    <button class="nav-arrow next" aria-label="Siguiente" onclick="next()">›</button>

    <div class="frame">
      <div class="canvas-wrap" id="canvas">
        <img src="images/IMG_0262.jpeg" alt="El Campeón contra el Gato — El Greco style" class="active" data-slide="0"/>
        <img src="images/IMG_6550.jpeg" alt="Round 1 — Goya Black Paintings style" data-slide="1"/>
        <img src="images/IMG_6266.jpeg" alt="El Jardín de las Delicias Felinas — Bosch style" data-slide="2"/>
        <img src="images/IMG_6674.jpeg" alt="Le Boxeur et le Chat — Cubist style" data-slide="3"/>
      </div>
    </div>
  </div>

  <!-- PLACARD -->
  <div class="placard" id="placard">
    <!-- populated by JS -->
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <span class="counter" id="counter">I / IV</span>
    <button class="auto-btn" id="autoBtn" onclick="toggleAuto()">Auto</button>
  </div>

  <!-- THUMBNAIL STRIP -->
  <div class="thumbstrip" id="thumbs">
    <!-- populated by JS -->
  </div>

</div>

<footer>
  <div class="mark">Reservado &middot; Adquisición Reciente</div>
  <div style="margin-top:8px">Colección particular &middot; Serie: <em>Cat Boxing Club</em></div>
</footer>

<script>
  const WORKS = [
    {
      src: 'images/IMG_0262.jpeg',
      inv: 'P-2601 · Sala 009B',
      title: 'El Campeón contra el Gato',
      artist: 'Atribuido al círculo del Greco',
      meta: 'c. 1598 · Óleo sobre lienzo · 118 × 102 cm',
      commentary: 'Vista de Toledo al fondo, figuras alargadas, luz divina que atraviesa nubes tormentosas — todos los rasgos canónicos del Greco. El púgil asume la postura de un mártir manierista; el gato, iluminado celestialmente, cumple el papel del santo ascendente. Los rostros desdibujados tras las cuerdas recuerdan al coro anónimo del Entierro del Conde de Orgaz.'
    },
    {
      src: 'images/IMG_6550.jpeg',
      inv: 'P-3470 · Sala 067',
      title: 'Round 1',
      artist: 'Escuela de Goya — Pinturas Negras',
      meta: 'c. 1820 · Óleo sobre yeso trasladado a lienzo · 88 × 112 cm',
      commentary: 'Tenebrismo desaturado y atmósfera asfixiante propias de la última etapa goyesca en la Quinta del Sordo. El poste de madera con la inscripción "Round 1" funciona como sátira moral: el primer asalto es el único asalto. Las caras espectadoras tras las cuerdas son herederas directas del Aquelarre y del Duelo a Garrotazos.'
    },
    {
      src: 'images/IMG_6266.jpeg',
      inv: 'P-2823 · Sala 056A',
      title: 'El Jardín de las Delicias Felinas',
      artist: 'Atribuido a El Bosco y taller',
      meta: 'c. 1505 · Óleo sobre tabla de roble · 94 × 86 cm',
      commentary: 'Un paralelismo menor del Jardín de las Delicias. El ring ocupa el orden central; los márgenes descienden al tormento boschiano habitual — peces con cabeza de felino, híbridos de pico y mandíbula, torres en llamas al horizonte. El cartel que se lee "ROID" — parodia del "PARADISUS" — anticipa el sarcasmo iconográfico del maestro.'
    },
    {
      src: 'images/IMG_6674.jpeg',
      inv: 'P-7012 · Sala Contemporánea',
      title: 'Le Boxeur et le Chat',
      artist: 'Escuela de Picasso / Juan Gris',
      meta: 'c. 1912 · Óleo sobre lienzo · Cubismo analítico · 72 × 64 cm',
      commentary: 'La escena descompuesta en planos geométricos superpuestos. Las orejas del gato se convierten en vectores triangulares; los guantes se reducen a esferas cromáticas rojas. Eco parisino de la disputa madrileña anterior — el mismo drama trasladado al vocabulario de Les Demoiselles, filtrado por la paleta austera de Juan Gris.'
    }
  ];

  let current = 0;
  let autoPlay = null;
  const ROMAN = ['I','II','III','IV'];

  const canvas = document.getElementById('canvas');
  const placard = document.getElementById('placard');
  const counter = document.getElementById('counter');
  const thumbs = document.getElementById('thumbs');

  // Build thumbnails
  WORKS.forEach((w, i) => {
    const t = document.createElement('div');
    t.className = 'thumb' + (i === 0 ? ' active' : '');
    t.innerHTML = `<img src="${w.src}" alt="${w.title}"/>`;
    t.addEventListener('click', () => go(i));
    thumbs.appendChild(t);
  });

  // Set slide index attributes on images to match WORKS order
  const imgs = canvas.querySelectorAll('img');

  function render(i) {
    current = (i + WORKS.length) % WORKS.length;
    // fade images
    imgs.forEach((img, idx) => {
      const want = WORKS[current].src;
      img.classList.toggle('active', img.getAttribute('src') === want);
    });
    // placard
    const w = WORKS[current];
    placard.innerHTML = `
      <div class="inv">${w.inv}</div>
      <h2>${w.title}</h2>
      <div class="artist">${w.artist}</div>
      <div class="meta">${w.meta}</div>
      <div class="commentary">${w.commentary}</div>
    `;
    counter.textContent = `${ROMAN[current]} / IV`;
    // thumbs
    thumbs.querySelectorAll('.thumb').forEach((t, idx) => {
      t.classList.toggle('active', idx === current);
    });
  }

  function go(i)    { render(i); }
  function next()   { render(current + 1); }
  function prev()   { render(current - 1); }

  function toggleAuto() {
    const btn = document.getElementById('autoBtn');
    if (autoPlay) {
      clearInterval(autoPlay);
      autoPlay = null;
      btn.classList.remove('on');
      btn.textContent = 'Auto';
    } else {
      autoPlay = setInterval(next, 5000);
      btn.classList.add('on');
      btn.textContent = 'Pausar';
    }
  }

  // keyboard nav
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') next();
    else if (e.key === 'ArrowLeft') prev();
  });

  render(0);
</script>
</body>
</html>
